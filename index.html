<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#ff6b8a" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://storage.googleapis.com https://*.vercel.app; img-src 'self' data: blob: https://*.vercel.app; connect-src 'self' https://cdn.jsdelivr.net https://storage.googleapis.com https://*.vercel.app; style-src 'self' 'unsafe-inline'; font-src 'self'; worker-src 'self' blob:;" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>LightsOn</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <div class="app-container" role="application" aria-label="LightsOn应用">
    <!-- Header -->
    <header class="app-header" role="banner">
      <div class="app-logo">
        <span class="icon" aria-hidden="true">✨</span>LightsOn
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btn-history" title="历史记录" aria-label="查看历史记录">📋</button>
      </div>
    </header>

    <!-- Upload View -->
    <section class="view" id="view-upload" role="region" aria-label="上传照片">
      <div class="upload-area">
        <div class="upload-illustration" aria-hidden="true">
          <div class="upload-icon-wrap">
            <span class="upload-icon">📸</span>
          </div>
          <div class="upload-dots">
            <span class="dot dot-1"></span>
            <span class="dot dot-2"></span>
            <span class="dot dot-3"></span>
          </div>
        </div>
        <h2 class="upload-title">上传一张照片</h2>
        <p class="upload-desc">分析光线问题，告诉你怎样补光更好看</p>
        <button class="btn-upload" id="btn-upload" aria-label="选择照片进行分析">
          <span class="btn-upload-icon">＋</span>
          选择照片
        </button>
        <p class="upload-support">支持 JPG、PNG、HEIC 格式</p>
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none" aria-label="选择图片文件" />
    </section>

    <!-- Result View -->
    <section class="view hidden" id="view-result" role="region" aria-label="分析结果">
      <div class="result-content">
        <div class="result-image-wrap">
          <img id="result-image" alt="分析照片" />
        </div>
        <div class="issue-card" role="alert" aria-live="assertive">
          <div class="issue-icon" id="issue-icon" aria-hidden="true">🔍</div>
          <div class="issue-info">
            <div class="issue-label" id="issue-label"></div>
            <div class="issue-detail" id="issue-detail"></div>
          </div>
        </div>
        <div class="suggestions-card">
          <h2 class="suggestions-title" id="suggestions-title">💡 试试这样：</h2>
          <ul class="suggestion-list" id="suggestion-list" role="list" aria-labelledby="suggestions-title"></ul>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" id="btn-reanalyze" aria-label="重新上传分析">重新分析</button>
      </div>
    </section>

    <!-- History View -->
    <section class="view hidden" id="view-history" role="region" aria-label="历史记录">
      <div class="history-header">
        <button class="btn-icon" id="btn-back-history" aria-label="返回首页">←</button>
        <h2 class="history-title">历史记录</h2>
      </div>
      <div class="empty-state" id="empty-history" role="status">
        <div class="icon" aria-hidden="true">📸</div>
        <p class="text">还没有分析记录，快去上传一张照片吧～</p>
      </div>
      <div class="history-list hidden" id="history-list" role="list" aria-label="历史记录列表"></div>
    </section>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loading-overlay" role="progressbar" aria-busy="false" aria-label="正在分析光线">
      <div class="loading-spinner" aria-hidden="true"></div>
      <div class="loading-text">正在分析光线...</div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
